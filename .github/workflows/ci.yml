name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  precheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenCode CLI
        run: bun add --global opencode-ai@1.1.48

      - name: Check OpenCode CLI
        run: opencode --version

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Integration test
        run: bun run test:integration

      - name: Build
        run: bun run build

  build:
    needs: precheck
    if: needs.precheck.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
